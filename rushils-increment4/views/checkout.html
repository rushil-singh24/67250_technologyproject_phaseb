<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Your name" />
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems" />
    <meta name="description" content="MonoMuse website redesign project" />
    <script src="../static/script.js" defer></script>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>MonoMuse | Checkout</title>
  </head>
  <body onload="addYear()">

    <div class="container">
      <header class="header">
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
      </header>

      <nav class="nav_bar">
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a href="checkout.html">Checkout</a>
      </nav>

      <main class="main">
        <h2>Checkout Information</h2>
        <p>
          Review the information needed for your visit, then continue from the Tickets page to
          choose a date and complete the purchase interaction.
        </p>

        <form>
          <label for="name">Name: (required)</label><br>
          <input type="text" id="name" name="name" required><br><br>

          <label for="email">Email: (required)</label><br>
          <input type="email" id="email" name="email" required><br><br>

          <label for="quantity">Ticket Quantity: (required)</label><br>
          <input type="number" id="quantity" name="quantity" required><br><br>

          <button type="submit" class="cta">Submit</button>
        </form>
      </main>

      <footer class="footer">
        <p id="copyYear"></p>
      </footer>
    </div>

  </body>
</html>
